name: build
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

env:
  REPO: 'aseprite/aseprite'
  SKIA_URL: 'https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip'
  SKIA_DIR: ${{ github.workspace }}\skia
  SKIA_LIBRARY_DIR: ${{ github.workspace }}\skia\out\Release-x64
  SKIA_LIBRARY: ${{ github.workspace }}\skia\out\Release-x64\skia.lib
  BUILD_PATH: '${{ github.workspace }}/build/bin'
  UPLOAD_RELEASE: true

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
      aseprite_tag: ${{ steps.check.outputs.aseprite_tag }}
    steps:
      - name: Get latest aseprite/aseprite release tag
        id: check
        shell: bash
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/aseprite/aseprite/releases/latest | jq -r .tag_name)
          my_latest_tag=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            | jq -r 'if type == "array" and length > 0 then .[0].tag_name else empty end')
          echo "latest_tag: $latest_tag"
          echo "my_latest_tag: $my_latest_tag"
          if [[ -z "$latest_tag" || "$latest_tag" == "null" ]]; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [[ "$latest_tag" == "$my_latest_tag" ]]; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "aseprite_tag=$latest_tag" >> $GITHUB_OUTPUT
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: windows-latest
    needs: pre-check
    if: needs.pre-check.outputs.skip_build == 'false'
    permissions:
      contents: write

    steps:
      - name: Checkout Aseprite source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          ref: ${{ needs.pre-check.outputs.aseprite_tag }}
          submodules: 'recursive'

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      # ── Cache Skia so repeat builds are much faster ──────────────────────
      - name: Cache Skia
        id: cache-skia
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-m124-08a5439a6b-windows-x64

      - name: Download Skia (if not cached)
        if: steps.cache-skia.outputs.cache-hit != 'true'
        run: |
          curl -L -o skia.zip ${{ env.SKIA_URL }}
          7z x skia.zip -oskia

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure with CMake
        run: |
          mkdir build
          cd build
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="${{ env.SKIA_DIR }}" `
            -DSKIA_LIBRARY_DIR="${{ env.SKIA_LIBRARY_DIR }}" `
            -DSKIA_LIBRARY="${{ env.SKIA_LIBRARY }}" `
            ..

      - name: Build
        run: |
          cd build
          ninja aseprite

      # ── THE FIX: copy the missing DLL into the output folder ─────────────
      - name: Copy required DLLs
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path "C:\", "C:\Program Files\", "C:\Windows\System32\" `
            -Filter "libcrypto-3-x64.dll" -Recurse -ErrorAction SilentlyContinue `
            | Select-Object -First 1 -ExpandProperty FullName
          if ($dll) {
            Write-Host "Found DLL at: $dll"
            Copy-Item $dll "${{ env.BUILD_PATH }}\"
          } else {
            Write-Error "libcrypto-3-x64.dll not found on runner — build may be broken."
            exit 1
          }
          # Also grab libssl in case it's needed
          $ssl = Get-ChildItem -Path "C:\", "C:\Program Files\", "C:\Windows\System32\" `
            -Filter "libssl-3-x64.dll" -Recurse -ErrorAction SilentlyContinue `
            | Select-Object -First 1 -ExpandProperty FullName
          if ($ssl) {
            Write-Host "Found SSL DLL at: $ssl"
            Copy-Item $ssl "${{ env.BUILD_PATH }}\"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-windows
          path: |
            ${{ env.BUILD_PATH }}/data
            ${{ env.BUILD_PATH }}/aseprite.exe
            ${{ env.BUILD_PATH }}/libcrypto-3-x64.dll
            ${{ env.BUILD_PATH }}/libssl-3-x64.dll

      - name: Package release archive
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          7z a ${{ env.BUILD_PATH }}/aseprite.7z `
            "${{ env.BUILD_PATH }}/data" `
            "${{ env.BUILD_PATH }}/aseprite.exe" `
            "${{ env.BUILD_PATH }}/libcrypto-3-x64.dll" `
            "${{ env.BUILD_PATH }}/libssl-3-x64.dll"
          echo "Aseprite ${{ needs.pre-check.outputs.aseprite_tag }}" > release.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.conclusion == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.pre-check.outputs.aseprite_tag }}
          body_path: release.txt
          files: ${{ env.BUILD_PATH }}/aseprite.7z
